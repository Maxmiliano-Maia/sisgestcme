<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerenciar Usuários</title>
</head>

<body>

<button id="btnVoltar">⬅ Voltar</button>
<button id="btnLogout">🚪 Sair</button>

<h2>Painel de Usuários</h2>
<h3>➕ Registrar Usuário</h3>

<input id="novoEmail" placeholder="Email">
<input id="novaSenha" type="password" placeholder="Senha">

<select id="novoSetor">
<option value="expurgo">expurgo</option>
<option value="lavagem">lavagem</option>
<option value="preparo">preparo</option>
<option value="esterilizacao">esterilizacao</option>
<option value="distribuicao">distribuicao</option>
</select>

<select id="novaPermissao">
<option value="usuario">usuario</option>
<option value="admin">admin</option>
</select>

<button type="button" id="btnCriarUsuario">Criar Usuário</button>

<hr>

<div id="listaUsuarios"></div>

<script type="module" src="usuarios.js"></script>

</body>
</html>
