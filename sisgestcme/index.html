<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Sistema</title>

</head>

<body>

<button id="btnLogout">Sair</button>

<input id="lote" placeholder="Lote">
<input id="descricao" placeholder="Descrição">
<button id="btnCadastrar">Cadastrar</button>

<div id="lista"></div>

<script type="module">

let isAdmin = false;
let setorUsuario = null;
import {
  criarMaterial,
  listarMateriais,
  atualizarStatus,
  deletarMaterial
} from './crud.js';

import { logout } from './auth.js';
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  ref,
  get,
  set,
  onValue,
  update,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// LOGOUT
document.getElementById("btnLogout").addEventListener("click", async () => {
  await logout();
  window.location.href = "login.html";
});

// CRIAR MATERIAL
document.getElementById("btnCadastrar").addEventListener("click", () => {
  const lote = document.getElementById("lote").value;
  const descricao = document.getElementById("descricao").value;

  criarMaterial(lote, descricao);
});

// ATUALIZAR STATUS
window.mudar = (id, status) => {
  if (!isAdmin && setorUsuario !== status) {
    alert("Sem permissão!");
    return;
  }

  atualizarStatus(id, status);
};

// AUTH
onAuthStateChanged(auth, async (user) => {
  if (user) {

const snap = await get(ref(db, `usuarios/${user.uid}`));

let dados = snap.val();

if (!dados) {
  console.warn("Criando usuário no DB...");

  dados = {
    email: user.email,
    setor: "expurgo"
  };

  await set(ref(db, `usuarios/${user.uid}`), dados);
}

// AGORA SEMPRE EXISTE
setorUsuario = dados.setor;
isAdmin = setorUsuario === "admin";

    // LISTAR
    listarMateriais((dados) => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      if (!dados) return;

      for (let id in dados) {
        let m = dados[id];

        lista.innerHTML += `
          <div>
            ${m.descricao} (${m.lote})<br>
            Status: ${m.status}

            <select onchange="mudar('${id}', this.value)">
              <option ${m.status === "expurgo" ? "selected" : ""}>expurgo</option>
              <option ${m.status === "lavagem" ? "selected" : ""}>lavagem</option>
              <option ${m.status === "esterilizacao" ? "selected" : ""}>esterilizacao</option>
              <option ${m.status === "distribuicao" ? "selected" : ""}>distribuicao</option>
            </select>

            ${isAdmin ? `<button onclick="excluir('${id}')">Excluir</button>` : ''}
          </div>
          <hr>
        `;
      }
    });

  } else {
    window.location.href = "login.html";
  }
});

// EXCLUIR
window.excluir = (id) => {
  if (!isAdmin) {
    alert("Apenas admin pode excluir!");
    return;
  }

  deletarMaterial(id);
};

</script>

</body>
</html>
