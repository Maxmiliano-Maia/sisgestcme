<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Sistema de Controle de Materiais</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sistema de controle de materiais hospitalares">
</head>

<body>

<div id="infoUsuario"></div>
<hr>
<button id="btnLogout">Sair</button>
<button id="btnUsuarios" style="display: none;">
  Gerenciar Usuários
</button>

<input id="lote" placeholder="Lote">
<input id="descricao" placeholder="Descrição">
<button id="btnCadastrar">Cadastrar</button>

<br><br>
<input type="text" id="pesquisa" placeholder="Pesquisar por lote ou descrição">

<div id="lista"></div>

<script type="module">

let isAdmin = false;
let permissaoUsuario = null;
let setorUsuario = null;

import {
  criarMaterial,
  listarMateriais,
  atualizarStatus,
  deletarMaterial,
  atualizarLote
} from './crud.js';

import { logout } from './auth.js';
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  ref,
  get,
  set,
  onValue,
  update,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const btnUsuarios = document.getElementById("btnUsuarios");

// LOGOUT
document.getElementById("btnLogout").addEventListener("click", async () => {
  await logout();
  window.location.href = "login.html";
});

// CRIAR MATERIAL
document.getElementById("btnCadastrar").addEventListener("click", () => {
  const lote = document.getElementById("lote").value;
  const descricao = document.getElementById("descricao").value;

  criarMaterial(lote, descricao);
});

// ATUALIZAR STATUS
window.mudar = (id, status) => {
  if (!isAdmin && setorUsuario !== status) {
    alert("Sem permissão!");
    return;
  }

  atualizarStatus(id, status);
};

// AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const snap = await get(ref(db, `usuarios/${user.uid}`));
  let dados = snap.val();

  if (!dados) {

 dados = {
  email: user.email,
  setor: "expurgo",
  permissao: "usuario"
};

  await set(ref(db, `usuarios/${user.uid}`), dados);
  }

setorUsuario = dados.setor;
permissaoUsuario = dados.permissao || "usuario";

isAdmin = permissaoUsuario === "admin";

  if (isAdmin) {
    btnUsuarios.style.display = "inline-block";
  }

    listarMateriais((materiais) => {
    atualizarListaMateriais(materiais); // função que monta a lista
  });

  function atualizarListaMateriais(dados) {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!dados) return;

  for (let id in dados) {
    const m = dados[id];

    const div = document.createElement("div");
    div.textContent = `${m.descricao} (${m.lote}) - Status: ${m.status}`;

    lista.appendChild(div);
  }
}

const avatarSetor = {
  expurgo: "🧹",
  lavagem: "🧼",
  preparo: "🧪",
  esterilizacao: "🔥",
  distribuicao: "📦"
};

const avatar = avatarSetor[dados.setor] || "👤";

const info = document.getElementById("infoUsuario");

info.innerHTML = `
<div style="font-weight:bold;font-size:16px;">
  ${avatar} ${dados.nome || "Sem nome"} (${dados.email})
</div>

<div>
  🏥 ${dados.setor}
</div>

<div>
  🔑 ${permissaoUsuario}
</div>
`;

info.style.border = "1px solid #ccc";
info.style.padding = "10px";
info.style.marginBottom = "10px";
info.style.width = "fit-content";

const campoPesquisa = document.getElementById("pesquisa"); // novo input de pesquisa

campoPesquisa.addEventListener("input", () => {
  const filtro = campoPesquisa.value.toLowerCase(); // texto digitado

  listarMateriais((dados) => {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if (!dados) return;

    for (let id in dados) {
      let m = dados[id];

      // 🔎 FILTRO: exibe apenas se lote ou descrição contiver o texto
      if (!m.lote.toLowerCase().includes(filtro) &&
          !m.descricao.toLowerCase().includes(filtro)) {
        continue; // pula este item
      }

      const div = document.createElement("div");

      // texto descrição
      const texto = document.createElement("div");

      const descricao = document.createElement("span");
      descricao.textContent = m.descricao + " ";
      texto.appendChild(descricao);

      const loteInput = document.createElement("input");
      loteInput.value = m.lote;
      loteInput.style.width = "100px";

      loteInput.addEventListener("change", () => {
        atualizarLote(id, loteInput.value);
      });

      texto.appendChild(loteInput);

      div.appendChild(texto);

      // status
      const status = document.createElement("div");
      status.textContent = `Status: ${m.status}`;
      div.appendChild(status);

      // select de setores
      const select = document.createElement("select");
      const setores = ["expurgo", "lavagem", "preparo", "esterilizacao", "distribuicao"];
      setores.forEach(s => {
        const option = document.createElement("option");
        option.value = s;
        option.textContent = s;
        if (m.status === s) option.selected = true;
        select.appendChild(option);
      });

      select.addEventListener("change", (e) => {
        mudar(id, e.target.value);
      });
      div.appendChild(select);

      // botão excluir (apenas admin)
      if (isAdmin) {
        const btn = document.createElement("button");
        btn.textContent = "Excluir";
        btn.addEventListener("click", () => excluir(id));
        div.appendChild(btn);
      }

      lista.appendChild(div);
      lista.appendChild(document.createElement("hr"));
    }
  });
});
});

btnUsuarios.addEventListener("click", () => {
  window.location.href = "usuarios.html";
});

// EXCLUIR
window.excluir = (id) => {
  if (!isAdmin) {
    alert("Apenas admin pode excluir!");
    return;
  }

  deletarMaterial(id);
};

</script>

</body>
</html>
