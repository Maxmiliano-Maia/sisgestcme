<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<form id="loginForm">

<input id="email" type="email" placeholder="Email" required autocomplete="username">

<input id="senha" type="password" placeholder="Senha" required autocomplete="current-password">

<label>
<input type="checkbox" id="lembrar">
Lembrar meu email
</label>

<button type="submit" id="btnEntrar">Entrar</button>
<button type="button" id="btnResetSenha">
Esqueci minha senha
</button>

</form>

<div id="loginRapido" style="
display:none;
border:1px solid #ccc;
padding:20px;
width:250px;
text-align:center;
margin-bottom:20px;
">

<div id="avatarUsuario" style="
width:70px;
height:70px;
border-radius:50%;
background:#1976d2;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
margin:auto;
margin-bottom:10px;
">
</div>

<div id="emailRapido" style="font-weight:bold;margin-bottom:5px;"></div>
<div id="setorRapido" style="margin-bottom:15px;color:#666;"></div>

<button type="button" id="btnContinuar">Entrar</button>
<br><br>
<button type="button" id="btnOutraConta">Usar outra conta</button>

</div>

<script type="module">
let emailSalvo = localStorage.getItem("emailSalvo");
let setorSalvo = localStorage.getItem("setorSalvo");
import { recuperarSenha } from "./auth.js";

document
.getElementById("btnResetSenha")
.addEventListener("click", () => {

  const email = document
  .getElementById("email")
  .value;

  if (!email) {

    alert("Digite seu email primeiro!");

    return;

  }

  recuperarSenha(email);

});

import { login, cadastrar } from './auth.js';
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const setorInput = document.getElementById("setor");
const btnEntrar = document.getElementById("btnEntrar");

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();
  const lembrar = document.getElementById("lembrar").checked;
  
  if (!email || !senha) {
    alert("Preencha email e senha!");
    return;
  }

  try {
    await login(email, senha);

    if (lembrar) {
      localStorage.setItem("emailSalvo", email);
    } else {
      localStorage.removeItem("emailSalvo");
    }

    window.location.replace("index.html");
  } catch (e) {
    alert("Erro ao logar: " + e.message);
  }
});

if (emailSalvo) {

  document.getElementById("loginRapido").style.display = "block";
  document.getElementById("loginForm").style.display = "none";

  document.getElementById("emailRapido").textContent = emailSalvo;

  const avatar = document.getElementById("avatarUsuario");
  avatar.textContent = simboloSetor(setorSalvo);

}

// REDIRECIONAMENTO AUTOMÁTICO
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});

document.getElementById("btnContinuar").addEventListener("click", () => {

  emailInput.value = emailSalvo;

  document.getElementById("loginForm").style.display = "block";
  document.getElementById("loginRapido").style.display = "none";

  senhaInput.focus();

});

document.getElementById("btnOutraConta").addEventListener("click", () => {

  localStorage.removeItem("emailSalvo");
  localStorage.removeItem("setorSalvo");

  document.getElementById("loginRapido").style.display = "none";
  document.getElementById("loginForm").style.display = "block";

});

function simboloSetor(setor){

  const icones = {
    expurgo: "🧼",
    lavagem: "🚿",
    preparo: "🛠️",
    esterilizacao: "♨️",
    distribuicao: "📦",
    admin: "⚕️"
  };

  return icones[setor] || "🏥";
}


</script>

</body>
</html>
