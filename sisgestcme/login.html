<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<form id="loginForm">

<input id="email" type="email" placeholder="Email" required autocomplete="username">

<input id="senha" type="password" placeholder="Senha" required autocomplete="current-password">

<label>
<input type="checkbox" id="lembrar">
Lembrar meu email
</label>

<select id="setor">
  <option value="expurgo">Expurgo</option>
  <option value="lavagem">Lavagem</option>
  <option value="preparo">Preparo</option>
  <option value="esterilizacao">Esterilização</option>
  <option value="distribuicao">Distribuição</option>
</select>

<button type="submit" id="btnEntrar">Entrar</button>
<button type="button" id="btnResetSenha">
Esqueci minha senha
</button>
<button type="button" id="btnRegistrar">Registrar</button>

</form>

<div id="loginRapido" style="display:none; border:1px solid #ccc; padding:15px; margin-bottom:20px;">
  <div id="emailRapido"></div>

  <button id="btnContinuar">Continuar</button>
  <button id="btnOutraConta">Usar outra conta</button>
</div>

<script type="module">
let emailSalvo = localStorage.getItem("emailSalvo");
import { recuperarSenha } from "./auth.js";

document
.getElementById("btnResetSenha")
.addEventListener("click", () => {

  const email = document
  .getElementById("email")
  .value;

  if (!email) {

    alert("Digite seu email primeiro!");

    return;

  }

  recuperarSenha(email);

});

import { login, cadastrar } from './auth.js';
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const setorInput = document.getElementById("setor");
const btnEntrar = document.getElementById("btnEntrar");
const btnRegistrar = document.getElementById("btnRegistrar");

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();
  const lembrar = document.getElementById("lembrar").checked;


  if (!email || !senha) {
    alert("Preencha email e senha!");
    return;
  }

  try {
    await login(email, senha);
    if (lembrar) {
      localStorage.setItem("emailSalvo", email);
    } else {
      localStorage.removeItem("emailSalvo");
    }

    window.location.replace("index.html");
  } catch (e) {
    alert("Erro ao logar: " + e.message);
  }

});

if (emailSalvo && emailSalvo !== "") {
  document.getElementById("loginRapido").style.display = "block";
  document.getElementById("emailRapido").textContent = "Continuar como: " + emailSalvo;

  document.getElementById("loginForm").style.display = "none";
}

// REGISTRAR
btnRegistrar.addEventListener("click", async () => {

  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();
  const setor = setorInput.value;

  if (!email || !senha) {
    alert("Preencha todos os campos!");
    return;
  }

  if (senha.length < 6) {
    alert("Senha precisa ter pelo menos 6 caracteres!");
    return;
  }

  btnRegistrar.disabled = true;

  try {
    await cadastrar(email, senha, setor);
    alert("Usuário criado!");
  } catch (e) {
    alert("Erro ao cadastrar: " + e.message);
  }

  btnRegistrar.disabled = false;
});

// REDIRECIONAMENTO AUTOMÁTICO
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});

document.getElementById("btnContinuar").addEventListener("click", () => {

  emailInput.value = emailSalvo;

  document.getElementById("loginForm").style.display = "block";
  document.getElementById("loginRapido").style.display = "none";

  senhaInput.focus();

});

document.getElementById("btnOutraConta").addEventListener("click", () => {

  localStorage.removeItem("emailSalvo");

  document.getElementById("loginRapido").style.display = "none";
  document.getElementById("loginForm").style.display = "block";

});

</script>

</body>
</html>
