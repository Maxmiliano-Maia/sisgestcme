<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<select id="setor">
  <option value="expurgo">Expurgo</option>
  <option value="lavagem">Lavagem</option>
  <option value="preparo">Preparo</option>
  <option value="esterilizacao">Esterilização</option>
  <option value="distribuicao">Distribuição</option>
</select>

<button id="btnEntrar">Entrar</button>
<button id="btnRegistrar">Registrar</button>

<script type="module">

import { login, cadastrar } from './auth.js';
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const setorInput = document.getElementById("setor");

const btnEntrar = document.getElementById("btnEntrar");
const btnRegistrar = document.getElementById("btnRegistrar");

// LOGIN
btnEntrar.addEventListener("click", async () => {

  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();

  if (!email || !senha) {
    alert("Preencha email e senha!");
    return;
  }

  btnEntrar.disabled = true;

  try {
    await login(email, senha);
    window.location.href = "index.html";
  } catch (e) {
    alert("Erro ao logar: " + e.message);
  }

  btnEntrar.disabled = false;
});

// REGISTRAR
btnRegistrar.addEventListener("click", async () => {

  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();
  const setor = setorInput.value;

  if (!email || !senha) {
    alert("Preencha todos os campos!");
    return;
  }

  if (senha.length < 6) {
    alert("Senha precisa ter pelo menos 6 caracteres!");
    return;
  }

  btnRegistrar.disabled = true;

  try {
    await cadastrar(email, senha, setor);
    alert("Usuário criado!");
  } catch (e) {
    alert("Erro ao cadastrar: " + e.message);
  }

  btnRegistrar.disabled = false;
});

// REDIRECIONAMENTO AUTOMÁTICO
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});

</script>

</body>
</html>
